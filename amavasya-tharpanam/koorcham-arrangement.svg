<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="'Source Serif 4', Georgia, serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3efe7"/>
      <stop offset="100%" stop-color="#ebe5d6"/>
    </linearGradient>
    <linearGradient id="darbhaGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a7c3f"/>
      <stop offset="50%" stop-color="#5a9a4a"/>
      <stop offset="100%" stop-color="#4a7c3f"/>
    </linearGradient>
    <linearGradient id="koorchamGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B7335"/>
      <stop offset="50%" stop-color="#C4A030"/>
      <stop offset="100%" stop-color="#8B7335"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" rx="12" fill="url(#bg)" stroke="#c0b4a0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#2a1a42" font-family="'Playfair Display', Georgia, serif">Arrangement of Koorcham</text>
  <text x="350" y="56" text-anchor="middle" font-size="13" fill="#584e3e" font-style="italic">कूर्चम् विन्यासः — Placement for Amavasya Tharpanam</text>

  <!-- Compass directions -->
  <!-- East (top) -->
  <text x="350" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#3d2b5a">East (पूर्व)</text>
  <path d="M350 95 L345 105 L355 105 Z" fill="#3d2b5a"/>
  <!-- West (bottom) -->
  <text x="350" y="445" text-anchor="middle" font-size="15" font-weight="700" fill="#3d2b5a">West (पश्चिम)</text>
  <path d="M350 425 L345 415 L355 415 Z" fill="#3d2b5a"/>
  <!-- North (left) -->
  <text x="75" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#3d2b5a">North</text>
  <text x="75" y="278" text-anchor="middle" font-size="13" fill="#3d2b5a">(उत्तर)</text>
  <path d="M100 270 L110 265 L110 275 Z" fill="#3d2b5a"/>
  <!-- South (right) -->
  <text x="625" y="262" text-anchor="middle" font-size="15" font-weight="700" fill="#3d2b5a">South</text>
  <text x="625" y="278" text-anchor="middle" font-size="13" fill="#3d2b5a">(दक्षिण)</text>
  <path d="M600 270 L590 265 L590 275 Z" fill="#3d2b5a"/>

  <!-- Central ritual area -->
  <rect x="140" y="115" width="420" height="310" rx="8" fill="#fff" fill-opacity="0.5" stroke="#c0b4a0" stroke-width="1" stroke-dasharray="6 3"/>

  <!-- === Pithru Varga Koorcham (top, closer to East) === -->
  <!-- Koorcham bundle - stylized tied grass bundle -->
  <g transform="translate(350, 180)" filter="url(#shadow)">
    <!-- Darbha blades fanning out -->
    <ellipse cx="0" cy="0" rx="95" ry="12" fill="url(#koorchamGold)" stroke="#7a6520" stroke-width="1"/>
    <!-- Tie marks -->
    <line x1="-30" y1="-8" x2="-30" y2="8" stroke="#6b5a20" stroke-width="2"/>
    <line x1="30" y1="-8" x2="30" y2="8" stroke="#6b5a20" stroke-width="2"/>
    <!-- Sharp tips pointing south -->
    <line x1="95" y1="0" x2="115" y2="0" stroke="#5a9a4a" stroke-width="1.5"/>
    <line x1="95" y1="-3" x2="112" y2="-1" stroke="#5a9a4a" stroke-width="1"/>
    <line x1="95" y1="3" x2="112" y2="1" stroke="#5a9a4a" stroke-width="1"/>
    <!-- Blunt ends pointing north -->
    <line x1="-95" y1="0" x2="-108" y2="0" stroke="#4a7c3f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-95" y1="-3" x2="-105" y2="-2" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-95" y1="3" x2="-105" y2="2" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Label for Pithru Varga -->
  <rect x="260" y="148" width="180" height="18" rx="9" fill="#3d2b5a" fill-opacity="0.9"/>
  <text x="350" y="161" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Pithru Varga Koorcham</text>
  <text x="350" y="202" text-anchor="middle" font-size="10" fill="#584e3e" font-style="italic">पितृवर्ग कूर्चम् (Father's side)</text>

  <!-- Katta Pullu / Darbha base lines (East-West, under koorcham) -->
  <!-- 3 lines of cut darbha representing Vasu, Rudra, Aditya sthanam -->
  <g transform="translate(350, 245)">
    <line x1="-80" y1="-8" x2="80" y2="-8" stroke="#4a7c3f" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#4a7c3f" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-80" y1="8" x2="80" y2="8" stroke="#4a7c3f" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Darbha label left -->
  <text x="245" y="232" text-anchor="middle" font-size="10" fill="#4a7c3f" font-weight="600">Darbha</text>
  <text x="245" y="244" text-anchor="middle" font-size="9" fill="#4a7c3f">(दर्भ)</text>
  <!-- Darbha label right -->
  <text x="455" y="232" text-anchor="middle" font-size="10" fill="#4a7c3f" font-weight="600">Darbha</text>
  <text x="455" y="244" text-anchor="middle" font-size="9" fill="#4a7c3f">(दर्भ)</text>
  <!-- Small label for cut darbha lines -->
  <text x="350" y="268" text-anchor="middle" font-size="9" fill="#4a7c3f" font-style="italic">Katta Pullu — 3 lines (Vasu · Rudra · Aditya)</text>

  <!-- === Mathamaha Varga Koorcham (below, closer to West) === -->
  <g transform="translate(350, 320)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="95" ry="12" fill="url(#koorchamGold)" stroke="#7a6520" stroke-width="1"/>
    <line x1="-30" y1="-8" x2="-30" y2="8" stroke="#6b5a20" stroke-width="2"/>
    <line x1="30" y1="-8" x2="30" y2="8" stroke="#6b5a20" stroke-width="2"/>
    <!-- Sharp tips pointing south -->
    <line x1="95" y1="0" x2="115" y2="0" stroke="#5a9a4a" stroke-width="1.5"/>
    <line x1="95" y1="-3" x2="112" y2="-1" stroke="#5a9a4a" stroke-width="1"/>
    <line x1="95" y1="3" x2="112" y2="1" stroke="#5a9a4a" stroke-width="1"/>
    <!-- Blunt ends pointing north -->
    <line x1="-95" y1="0" x2="-108" y2="0" stroke="#4a7c3f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-95" y1="-3" x2="-105" y2="-2" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
    <line x1="-95" y1="3" x2="-105" y2="2" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Label for Mathamaha Varga -->
  <rect x="238" y="288" width="225" height="18" rx="9" fill="#6b4f1a" fill-opacity="0.9"/>
  <text x="350" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Mathamaha Varga Koorcham</text>
  <text x="350" y="346" text-anchor="middle" font-size="10" fill="#584e3e" font-style="italic">मातामहवर्ग कूर्चम् (Mother's father's side)</text>

  <!-- Performer position indicator -->
  <g transform="translate(350, 390)">
    <rect x="-65" y="-12" width="130" height="24" rx="12" fill="#3d2b5a" fill-opacity="0.12" stroke="#3d2b5a" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="0" y="4" text-anchor="middle" font-size="11" fill="#3d2b5a" font-weight="600">Performer faces East ↑</text>
  </g>

  <!-- Legend / Notes at bottom -->
  <g transform="translate(20, 465)">
    <text x="0" y="0" font-size="10.5" fill="#584e3e" font-weight="600">Notes:</text>
    <text x="0" y="16" font-size="9.5" fill="#584e3e">&#8226; Koorcham: 7 or 9 darbha blades tied together. Head (blunt end) faces North, tip faces South.</text>
    <text x="0" y="30" font-size="9.5" fill="#584e3e">&#8226; Katta Pullu: 3 lines of cut darbha placed East-West under the koorcham as seats (aasanam).</text>
    <text x="0" y="44" font-size="9.5" fill="#584e3e">&#8226; Some families use only one koorcham for both vargas. Follow your family tradition.</text>
  </g>
</svg>
