*{margin:0;padding:0;box-sizing:border-box}
:root{

}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

#app{min-height:100vh;display:flex;flex-direction:column}

.header{background:linear-gradient(135deg,#0d1225 0%,#151b35 100%);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}

.header-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;animation:pulse 2s infinite;will-change:opacity,box-shadow}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{opacity:.6;box-shadow:0 0 0 6px rgba(16,185,129,0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@media(prefers-reduced-motion:reduce){.live-dot{animation:none}.content{animation:none}.hover-widget{transition:none}.kpi,.card,.catalog-item,.medallion-layer{transition:none}}

.tabs{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;position:sticky;top:62px;z-index:99}
.tab{padding:11px 18px;font-size:12px;font-weight:500;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{color:var(--accent);font-weight:700;border-bottom-color:var(--accent)}

.content{padding:20px 24px;max-width:1520px;margin:0 auto;width:100%;animation:fadeIn .3s ease}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;transition:all .25s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.kpi-bar{position:absolute;top:0;left:0;width:100%;height:3px}
.kpi-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.kpi-value{font-size:26px;font-weight:800;letter-spacing:-.5px}
.kpi-sub{font-size:10px;color:var(--dim);margin-top:3px}
.kpi-trend{font-size:11px;font-weight:600;margin-left:8px}
.kpi-trend.up{color:var(--green)}
.kpi-trend.down{color:var(--red)}

.grid{display:grid;gap:14px;margin-bottom:14px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-23{grid-template-columns:2fr 1fr}
.grid-32{grid-template-columns:1fr 2fr}
.grid-4{grid-template-columns:repeat(4,1fr)}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;transition:all .25s;contain:layout style}
.card:hover{border-color:var(--border2)}

.card-title .badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}

.table-wrap{overflow-x:auto;overflow-y:auto;max-height:420px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:5}
th{background:var(--card2);color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);transition:background .15s}
tr.hoverable:hover td{background:var(--card2);cursor:pointer}
tr.hoverable{position:relative}

.pill{display:inline-block;padding:2px 10px;border-radius:4px;font-size:10px;font-weight:600}
.pill-green{background:rgba(16,185,129,.15);color:var(--green)}

.pill-purple{background:rgba(139,92,246,.15);color:var(--purple)}

.chart-box{position:relative;width:100%;height:100%;min-height:220px}

.hover-widget .hw-value{font-weight:600;color:var(--text)}

.hover-widget .hw-section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}

.hover-widget .hw-bar{height:6px;border-radius:3px;background:var(--card3);overflow:hidden;margin-top:4px}
.hover-widget .hw-bar-fill{height:100%;border-radius:3px;transition:width .3s}

.medallion-layer{text-align:center;padding:18px 24px;border-radius:12px;border:1px solid var(--border);min-width:140px;transition:all .3s}
.medallion-layer:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.medallion-arrow{color:var(--dim);font-size:24px;font-weight:300}
.medallion-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.medallion-count{font-size:20px;font-weight:800;margin-top:4px}
.medallion-sub{font-size:10px;color:var(--dim);margin-top:2px}

.arch-flow{display:flex;flex-direction:column;gap:16px;padding:10px 0}
.arch-row{display:flex;align-items:center;gap:10px}
.arch-box{padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;border:1px solid}
.arch-arrow-down{text-align:center;color:var(--dim);font-size:18px}

.catalog-item{padding:14px 16px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:var(--card)}

.score-ring{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;position:relative}

.back-link:hover{opacity:1!important}

@media(max-width:1024px){.grid-2,.grid-3,.grid-23,.grid-32{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.kpi-row{grid-template-columns:1fr}.header{padding:10px 14px}.content{padding:14px}.tabs{padding:0 8px}}

</style>

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'className') e.className = v;
    else if (k === 'innerHTML') e.innerHTML = v;
    else e.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function fmt(n, dec=0) {
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(dec > 0 ? dec : 0) + 'K';
  return '$' + n.toFixed(dec);
}
function fmtN(n) {
  return n.toLocaleString();
}
function pct(n) { return n.toFixed(1) + '%'; }

// ═══ HOVER WIDGET SYSTEM (debounced) ═══
function showHoverWidget(e, content) {
  hideHoverWidget();
  hoverWidget = el('div', { className: 'hover-widget' });
  hoverWidget.innerHTML = content;
  document.body.appendChild(hoverWidget);

  const rect = e.currentTarget.getBoundingClientRect();
  const ww = window.innerWidth;
  const wh = window.innerHeight;
  let left = rect.right + 16;
  let top = rect.top;

  requestAnimationFrame(() => {
    if (!hoverWidget) return;
    const hw = hoverWidget.getBoundingClientRect();
    if (left + hw.width > ww - 20) {
      left = rect.left - hw.width - 16;
    }
    if (top + hw.height > wh - 20) {
      top = Math.max(10, wh - hw.height - 20);
    }
    hoverWidget.style.left = left + 'px';
    hoverWidget.style.top = top + 'px';
    hoverWidget.classList.add('visible');

    // Render charts from stored configs (not JSON in DOM)
    hoverWidget.querySelectorAll('canvas[data-chart-id]').forEach(renderWidgetChart);
  });
}

function showHoverWidgetDebounced(e, contentFn) {
  if (hoverTimer) clearTimeout(hoverTimer);
  const target = e.currentTarget;
  hoverTimer = setTimeout(() => {
    showHoverWidget({ currentTarget: target }, contentFn());
  }, 60);
}

function hideHoverWidget() {
  if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
  if (hoverWidget) {
    hoverWidget.remove();
    hoverWidget = null;
  }
  widgetChartConfigs.clear();
  widgetChartCounter = 0;
}

function storeWidgetChartConfig(cfg) {
  const id = 'wc-' + (++widgetChartCounter);
  widgetChartConfigs.set(id, cfg);
  return id;
}

function renderWidgetChart(canvas) {
  const id = canvas.dataset.chartId;
  const cfg = widgetChartConfigs.get(id);
  if (!cfg) return;
  const ctx = canvas.getContext('2d');
  new Chart(ctx, cfg);
}

function sparkSvg(data, color, w=120, h=32) {
  const key = data.join(',') + color + w + h;
  if (sparkCache.has(key)) return sparkCache.get(key);
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i/(data.length-1))*w},${h - ((v-min)/range)*h}`).join(' ');
  const svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  sparkCache.set(key, svg);
  return svg;
}

function qualityBar(pct, color) {
  return `<div class="hw-bar"><div class="hw-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
}

// ═══ CHART UTILITIES ═══
function destroyCharts() {
  Object.values(activeCharts).forEach(c => { try { c.destroy(); } catch(e) {} });
  activeCharts = {};
}

function createChart(canvasId, config) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (activeCharts[canvasId]) {
    try { activeCharts[canvasId].destroy(); } catch(e) {}
  }
  const defaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: '#8892a8', font: { size: 11, family: 'Inter' }, boxWidth: 12, padding: 12 } },
      tooltip: {
        backgroundColor: '#1a1f35',
        titleColor: '#e8ecf4',
        bodyColor: '#8892a8',
        borderColor: '#252d45',
        borderWidth: 1,
        cornerRadius: 8,
        titleFont: { weight: '600' },
        bodyFont: { size: 11 },
        padding: 10
      }
    },
    scales: config.type === 'doughnut' || config.type === 'pie' || config.type === 'radar' || config.type === 'polarArea' ? undefined : {
      x: { ticks: { color: '#5a6380', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' }, border: { color: '#252d45' } },
      y: { ticks: { color: '#5a6380', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' }, border: { color: '#252d45' } }
    }
  };
  if (config.options) {
    config.options = deepMerge(defaults, config.options);
  } else {
    config.options = defaults;
  }
  activeCharts[canvasId] = new Chart(canvas.getContext('2d'), config);
}

function deepMerge(target, source) {
  const out = { ...target };
  for (const k of Object.keys(source)) {
    if (source[k] && typeof source[k] === 'object' && !Array.isArray(source[k])) {
      out[k] = deepMerge(out[k] || {}, source[k]);
    } else {
      out[k] = source[k];
    }
  }
  return out;
}

      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--muted)"><span class="live-dot"></span>LIVE — <span id="clock">${now.toLocaleTimeString()}</span></div>
        <div style="font-size:10px;color:var(--dim)">S3 + Snowflake + Athena | DQ: 97.5%</div>
        <a href="https://paddyspeaks.com/" style="font-size:10px;color:var(--accent);text-decoration:none;margin-top:2px;display:inline-block;opacity:.7;transition:opacity .2s" class="back-link">← PaddySpeaks.com</a>
      </div>
    </div>
  `;
}

function renderTabs() {
  return `<div class="tabs">${TABS.map(t =>
    `<button class="tab${activeTab === t.id ? ' active' : ''}" data-tab="${t.id}">${t.icon} ${t.label}</button>`
  ).join('')}</div>`;
}

// Tab click delegation
document.addEventListener('click', function(e) {
  const tab = e.target.closest('.tab[data-tab]');
  if (tab) switchTab(tab.dataset.tab);
});

function switchTab(tabId) {
  activeTab = tabId;
  hideHoverWidget();
  destroyCharts();
  renderContent();
  // Update active tab button
  document.querySelectorAll('.tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabId);
  });
}

function renderContent() {
  const contentEl = document.querySelector('.content');
  if (!contentEl) return;
  let content = '';
  switch(activeTab) {
    case 'overview': content = renderOverview(); break;
    case 'customer360': content = renderCustomer360(); break;
    case 'revenue': content = renderRevenue(); break;
    case 'quality': content = renderQuality(); break;
    case 'catalog': content = renderCatalog(); break;
  }
  contentEl.innerHTML = content;

  requestAnimationFrame(() => {
    switch(activeTab) {
      case 'overview': initOverviewCharts(); break;
      case 'customer360': initCustomer360Charts(); break;
      case 'revenue': initRevenueCharts(); break;
      case 'quality': initQualityCharts(); break;
      case 'catalog': initCatalogCharts(); break;
    }
  });
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = renderHeader() + renderTabs() + '<div class="content"></div>';
  renderContent();
}

// Clock updater (reduced frequency — every 5s instead of 1s)
setInterval(() => {
  const clock = document.getElementById('clock');
  if (clock) clock.textContent = new Date().toLocaleTimeString();
}, 5000);

// ═══ EVENT DELEGATION ═══
// Track currently hovered element to avoid re-triggering on child moves
let currentHoverRow = null;

document.addEventListener('mouseover', function(e) {
  const row = e.target.closest('[data-hover]');
  if (row === currentHoverRow) return; // still on same row, ignore
  if (!row) {
    // moved off any hover target
    if (currentHoverRow) { currentHoverRow = null; hideHoverWidget(); }
    return;
  }
  currentHoverRow = row;
  const type = row.dataset.hover;
  const idx = parseInt(row.dataset.idx ?? row.dataset.custIdx, 10);
  const fakeEvent = { currentTarget: row };
  switch(type) {
    case 'customer': showCustomerWidget(fakeEvent, idx); break;
    case 'product': showProductWidget(fakeEvent, idx); break;
    case 'region': showRegionWidget(fakeEvent, idx); break;
    case 'dqlayer': showDQLayerWidget(fakeEvent, idx); break;
    case 'dqrule': showDQRuleWidget(fakeEvent, idx); break;
    case 'catalog': showCatalogWidget(fakeEvent, idx); break;
  }
});

document.addEventListener('mouseout', function(e) {
  const row = e.target.closest('[data-hover]');
  if (!row || row !== currentHoverRow) return;
  // Check if we're moving to another child of the same row
  const related = e.relatedTarget;
  if (related && row.contains(related)) return; // still inside the row
  currentHoverRow = null;
  hideHoverWidget();
});

// Initialize
document.addEventListener('DOMContentLoaded', render);

// Close hover widget on scroll (passive for perf)
window.addEventListener('scroll', hideHoverWidget, { capture: true, passive: true });

</script>
