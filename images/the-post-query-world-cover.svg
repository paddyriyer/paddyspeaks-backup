<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0B1426"/>
      <stop offset="40%" stop-color="#132040"/>
      <stop offset="70%" stop-color="#1E3055"/>
      <stop offset="100%" stop-color="#1A4A5A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(13,139,139,0.2)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D8B8B"/>
      <stop offset="100%" stop-color="#14B8B8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Signal rings (concentric, fading) -->
  <circle cx="600" cy="260" r="80" fill="none" stroke="rgba(20,184,184,0.08)" stroke-width="1"/>
  <circle cx="600" cy="260" r="140" fill="none" stroke="rgba(20,184,184,0.06)" stroke-width="1"/>
  <circle cx="600" cy="260" r="210" fill="none" stroke="rgba(20,184,184,0.04)" stroke-width="1"/>
  <circle cx="600" cy="260" r="290" fill="none" stroke="rgba(20,184,184,0.03)" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="600" y="180" text-anchor="middle" font-family="monospace" font-size="13" fill="#14B8B8" letter-spacing="4" text-transform="uppercase" opacity="0.8">THE PADDYSPEAKS AI AGE COLLECTION</text>

  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" font-family="Georgia, 'DM Serif Display', serif" font-size="62" font-weight="400" fill="#ffffff" letter-spacing="-1">
    The <tspan fill="#14B8B8">Post-Query</tspan> World
  </text>

  <!-- Subtitle line -->
  <line x1="520" y1="290" x2="680" y2="290" stroke="url(#tealGrad)" stroke-width="2" opacity="0.5"/>

  <!-- Terminal box -->
  <rect x="370" y="320" width="460" height="110" rx="10" fill="rgba(0,0,0,0.35)" stroke="rgba(20,184,184,0.12)" stroke-width="1"/>
  <!-- Terminal dots -->
  <circle cx="394" cy="342" r="5" fill="#FF5F57"/>
  <circle cx="412" cy="342" r="5" fill="#FEBC2E"/>
  <circle cx="430" cy="342" r="5" fill="#28C840"/>
  <!-- Query crossed out -->
  <text x="394" y="378" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.25)" text-decoration="line-through">SELECT * FROM answers WHERE question = ?</text>
  <!-- New line -->
  <text x="394" y="408" font-family="monospace" font-size="14" fill="#14B8B8">AI already knows what you need.</text>

  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.55)" font-weight="300">When AI Answers Before You Ask</text>

  <!-- Byline -->
  <text x="600" y="550" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="2">PADDYSPEAKS · MARCH 2026</text>
</svg>
