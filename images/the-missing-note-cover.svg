<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#E8DFD0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines (like manuscript paper) -->
  <g opacity="0.03" stroke="#B8603F" stroke-width="1">
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
  </g>

  <!-- Music staff lines (5 lines, subtle) -->
  <g stroke="#B8603F" stroke-width="1.2" opacity="0.1">
    <line x1="100" y1="140" x2="1100" y2="140"/>
    <line x1="100" y1="155" x2="1100" y2="155"/>
    <line x1="100" y1="170" x2="1100" y2="170"/>
    <line x1="100" y1="185" x2="1100" y2="185"/>
    <line x1="100" y1="200" x2="1100" y2="200"/>
  </g>

  <!-- Scattered music notes (faint) -->
  <text x="200" y="175" font-size="28" fill="#B8603F" opacity="0.08">♪</text>
  <text x="380" y="160" font-size="24" fill="#B8603F" opacity="0.06">♩</text>
  <text x="550" y="190" font-size="32" fill="#B8603F" opacity="0.07">♫</text>
  <text x="750" y="155" font-size="26" fill="#B8603F" opacity="0.05">♬</text>
  <text x="920" y="180" font-size="30" fill="#B8603F" opacity="0.08">♪</text>

  <!-- Label -->
  <text x="600" y="260" text-anchor="middle" font-family="monospace" font-size="11" fill="#B8603F" letter-spacing="4" opacity="0.8">PADDYSPEAKS · VISUAL ESSAY</text>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="72" font-weight="700" fill="#2C1810" letter-spacing="-1">
    The <tspan font-style="italic" fill="#B8603F">Missing</tspan> Note
  </text>

  <!-- Divider -->
  <line x1="540" y1="370" x2="660" y2="370" stroke="#B8603F" stroke-width="2" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="600" y="415" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#7A6B5A" font-style="italic">Why video platforms are failing 200 million music students</text>
  <text x="600" y="445" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#7A6B5A" font-style="italic">and the billion-dollar feature hiding in plain sight.</text>

  <!-- Stats row -->
  <g text-anchor="middle">
    <text x="350" y="510" font-family="'Fraunces', Georgia, serif" font-size="32" font-weight="700" fill="#B8603F">$4.6B</text>
    <text x="350" y="535" font-family="monospace" font-size="9" fill="#7A6B5A" letter-spacing="2">MARKET SIZE 2026</text>

    <text x="600" y="510" font-family="'Fraunces', Georgia, serif" font-size="32" font-weight="700" fill="#B8603F">200M+</text>
    <text x="600" y="535" font-family="monospace" font-size="9" fill="#7A6B5A" letter-spacing="2">STUDENTS ONLINE</text>

    <text x="850" y="510" font-family="'Fraunces', Georgia, serif" font-size="32" font-weight="700" fill="#B8603F">0%</text>
    <text x="850" y="535" font-family="monospace" font-size="9" fill="#7A6B5A" letter-spacing="2">BUILT-IN FEEDBACK</text>
  </g>

  <!-- Byline -->
  <text x="600" y="590" text-anchor="middle" font-family="monospace" font-size="12" fill="#7A6B5A" letter-spacing="2" opacity="0.6">PADDYSPEAKS · MARCH 2026</text>
</svg>
