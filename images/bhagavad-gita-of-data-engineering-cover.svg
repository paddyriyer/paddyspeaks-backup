<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1A1210"/>
      <stop offset="30%" stop-color="#2A1810"/>
      <stop offset="60%" stop-color="#3D1F12"/>
      <stop offset="100%" stop-color="#5C1A1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(232,134,58,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="saffronGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8863A"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Om symbol (large, faint) -->
  <text x="950" y="250" font-size="280" fill="rgba(212,168,67,0.04)" font-weight="700">ॐ</text>

  <!-- Sanskrit verse -->
  <text x="600" y="170" text-anchor="middle" font-family="serif" font-size="22" fill="#D4A843" letter-spacing="2" opacity="0.7">कर्मण्येवाधिकारस्ते मा फलेषु कदाचन</text>

  <!-- Title -->
  <text x="600" y="260" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="-1">
    The <tspan fill="#E8863A">Bhagavad Gita</tspan>
  </text>
  <text x="600" y="325" text-anchor="middle" font-family="Georgia, 'Cormorant Garamond', serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    of Data Engineering
  </text>

  <!-- Saffron divider -->
  <line x1="520" y1="355" x2="680" y2="355" stroke="url(#saffronGrad)" stroke-width="3" opacity="0.6"/>

  <!-- Shloka terminal -->
  <rect x="350" y="380" width="500" height="90" rx="12" fill="rgba(0,0,0,0.35)" stroke="rgba(212,168,67,0.15)" stroke-width="1"/>
  <text x="600" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#D4A843" font-style="italic">"You have the right to work, but never to the fruit of work."</text>
  <text x="600" y="448" text-anchor="middle" font-family="monospace" font-size="11" fill="rgba(212,168,67,0.5)" letter-spacing="2">— BHAGAVAD GITA 2.47</text>

  <!-- Subtitle -->
  <text x="600" y="520" text-anchor="middle" font-family="sans-serif" font-size="15" fill="rgba(255,255,255,0.55)" font-weight="300">A philosophical survival guide for thriving when AI takes your tools</text>

  <!-- Byline -->
  <text x="600" y="570" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.3)" letter-spacing="2">PADDYSPEAKS · MARCH 2026</text>
</svg>
