<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="40%" stop-color="#1a1f35"/>
      <stop offset="70%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="hashGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b2b"/>
      <stop offset="100%" stop-color="#ff9a5c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Floating hashtags (scattered, muted) -->
  <text x="60" y="80" font-family="JetBrains Mono, monospace" font-size="16" fill="#ffffff" opacity="0.12"># Extract</text>
  <text x="250" y="140" font-family="JetBrains Mono, monospace" font-size="14" fill="#ff6b2b" opacity="0.15"># Transform</text>
  <text x="800" y="70" font-family="JetBrains Mono, monospace" font-size="15" fill="#ffffff" opacity="0.1"># Load</text>
  <text x="950" y="160" font-family="JetBrains Mono, monospace" font-size="13" fill="#ff6b2b" opacity="0.12"># Validate</text>
  <text x="700" y="530" font-family="JetBrains Mono, monospace" font-size="14" fill="#ffffff" opacity="0.1"># Test</text>
  <text x="100" y="560" font-family="JetBrains Mono, monospace" font-size="16" fill="#ff6b2b" opacity="0.1"># Deploy</text>
  <text x="1020" y="550" font-family="JetBrains Mono, monospace" font-size="13" fill="#ffffff" opacity="0.08"># Monitor</text>
  <text x="450" y="100" font-family="JetBrains Mono, monospace" font-size="12" fill="#ffffff" opacity="0.08"># Govern</text>
  <text x="1050" y="350" font-family="JetBrains Mono, monospace" font-size="14" fill="#ff6b2b" opacity="0.1"># Secure</text>
  <text x="50" y="350" font-family="JetBrains Mono, monospace" font-size="15" fill="#ffffff" opacity="0.08"># Scale</text>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900" fill="#ffffff" letter-spacing="-2">From Code to</text>
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="900" letter-spacing="-2">
    <tspan fill="url(#hashGrad)">#</tspan><tspan fill="#ffffff">Hashtags</tspan>
  </text>

  <!-- Subtitle line -->
  <line x1="500" y1="340" x2="700" y2="340" stroke="#ff6b2b" stroke-width="2" opacity="0.5"/>

  <!-- Terminal box -->
  <rect x="350" y="370" width="500" height="120" rx="10" fill="#0d1117" stroke="#1e2736" stroke-width="1.5"/>
  <!-- Terminal dots -->
  <circle cx="374" cy="392" r="6" fill="#ff5f56"/>
  <circle cx="394" cy="392" r="6" fill="#ffbd2e"/>
  <circle cx="414" cy="392" r="6" fill="#27c93f"/>
  <!-- Terminal text -->
  <text x="374" y="435" font-family="JetBrains Mono, monospace" font-size="15" fill="#7c8da6"># Describe your pipeline in plain English</text>
  <text x="374" y="465" font-family="JetBrains Mono, monospace" font-size="15" fill="#ff6b2b">#Extract</text>
  <text x="470" y="465" font-family="JetBrains Mono, monospace" font-size="15" fill="#5b9df7">#Transform</text>
  <text x="600" y="465" font-family="JetBrains Mono, monospace" font-size="15" fill="#34d399">#Load</text>
  <text x="670" y="465" font-family="JetBrains Mono, monospace" font-size="15" fill="#a78bfa">#Deploy</text>

  <!-- Byline -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#7c8da6" letter-spacing="2">PADDYSPEAKS · MARCH 2026</text>
</svg>
