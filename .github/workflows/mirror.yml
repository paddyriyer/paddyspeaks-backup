name: Mirror to backup
on:
  push:
    branches: ['**']
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Push mirror
        if: ${{ env.BACKUP_TOKEN != '' }}
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          git remote add backup "https://x-access-token:${BACKUP_TOKEN}@github.com/paddyriyer/paddyspeaks-backup.git"
          git push backup --mirror
