name: Mirror to backup
on:
  push:
    branches: ['**']
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BACKUP_TOKEN }}
      - name: Push mirror
        run: |
          git remote add backup https://x-access-token:${{ secrets.BACKUP_TOKEN }}@github.com/paddyriyer/paddyspeaks-backup.git
          git push backup --mirror
